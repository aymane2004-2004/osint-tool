<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Analyzer Ultimate | Intelligence Platform</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Segoe UI', 'Rubik', sans-serif;
        background: linear-gradient(135deg, #0a0e27 0%, #0a0a0a 100%);
        color: #fff;
        min-height: 100vh;
    }
    
    .bg-animation {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 20% 50%, rgba(0,255,255,0.05) 0%, transparent 50%);
        animation: pulse 4s ease-in-out infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
    }
    
    .container { max-width: 1400px; position: relative; z-index: 1; }
    
    .glitch-header { text-align: center; margin: 20px 0 30px; }
    
    .glitch-header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: gradient 3s ease infinite;
    }
    
    @keyframes gradient {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }
    
    .subtitle {
        text-align: center;
        color: #00ffcc;
        font-size: 0.85rem;
        border-top: 1px solid rgba(0,255,255,0.3);
        border-bottom: 1px solid rgba(0,255,255,0.3);
        display: inline-block;
        padding: 5px 20px;
        letter-spacing: 2px;
    }
    
    .glass-card {
        background: rgba(10,10,20,0.8);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(0,255,255,0.2);
        transition: all 0.3s ease;
    }
    
    .search-container { padding: 25px; margin-bottom: 25px; }
    
    .form-control, .form-select {
        background: rgba(0,0,0,0.6);
        border: 1px solid #00ffcc;
        color: #00ffcc;
        font-family: 'Courier New', monospace;
    }
    
    .form-control:focus, .form-select:focus {
        background: rgba(0,0,0,0.8);
        border-color: #00ffff;
        box-shadow: 0 0 20px rgba(0,255,255,0.3);
        color: #00ffff;
    }
    
    .btn-hack {
        background: linear-gradient(135deg, #00ffcc, #0099ff);
        border: none;
        color: #000;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s;
    }
    
    .btn-hack:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(0,255,255,0.5);
        color: #000;
    }
    
    #resultMap {
        border: 2px solid rgba(0,255,255,0.3);
        height: 500px;
        margin-top: 20px;
        background: rgba(0,0,0,0.5);
        border-radius: 15px;
        overflow: hidden;
    }
    
    .terminal {
        background: rgba(0,0,0,0.8);
        border: 1px solid #00ffcc;
        border-radius: 15px;
        padding: 20px;
        margin-top: 25px;
    }
    
    .terminal-header {
        border-bottom: 1px solid #00ffcc;
        padding-bottom: 10px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .terminal-title { color: #00ffcc; font-family: monospace; font-size: 0.9rem; }
    
    .terminal-dots span {
        display: inline-block;
        width: 10px; height: 10px;
        border-radius: 50%;
        margin-left: 5px;
        animation: blink 1s infinite;
    }
    
    .terminal-dots span:nth-child(1) { background: #ff0000; }
    .terminal-dots span:nth-child(2) { background: #ffff00; animation-delay: 0.3s; }
    .terminal-dots span:nth-child(3) { background: #00ff00; animation-delay: 0.6s; }
    
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }
    
    #results { max-height: 400px; overflow-y: auto; }
    
    .result-card {
        background: rgba(0,255,255,0.05);
        border: 1px solid rgba(0,255,255,0.2);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 15px;
        transition: all 0.3s;
    }
    
    .result-card:hover {
        background: rgba(0,255,255,0.1);
        transform: translateX(10px);
        border-color: #00ffcc;
    }

    /* ── FIX: CSS-only site icon replaces broken Flaticon img ── */
    .site-icon {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid #00ffcc;
        background: rgba(0,20,20,0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1.4rem;
    }
    
    .result-card .info { flex: 1; }
    
    .result-card .title {
        font-weight: bold;
        color: #ffcc00;
        font-size: 1rem;
        margin-bottom: 5px;
    }
    
    .result-card .url {
        font-size: 0.7rem;
        color: #66ccff;
        word-break: break-all;
        font-family: monospace;
        margin-bottom: 5px;
        background: rgba(0,0,0,0.3);
        padding: 4px 8px;
        border-radius: 5px;
    }
    
    .result-card .type {
        font-size: 0.7rem;
        background: rgba(0,255,255,0.2);
        padding: 3px 10px;
        border-radius: 20px;
        display: inline-block;
        color: #00ffcc;
    }
    
    .result-card .button-group { display: flex; gap: 8px; }
    
    .result-card .btn-action {
        background: linear-gradient(135deg, #00ffcc, #0099ff);
        border: none;
        color: #000;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.3s;
        font-weight: bold;
        cursor: pointer;
        font-size: 0.8rem;
    }
    
    .result-card .btn-action.copy {
        background: rgba(0,255,255,0.2);
        border: 1px solid #00ffcc;
        color: #00ffcc;
    }
    
    .result-card .btn-action:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px rgba(0,255,255,0.5);
    }
    
    .toast-notification {
        position: fixed;
        bottom: 20px; right: 20px;
        background: #00ffcc;
        color: #000;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
        z-index: 3000;
        animation: slideIn 0.3s ease;
        display: none;
        font-family: monospace;
    }
    
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to   { transform: translateX(0);    opacity: 1; }
    }
    
    .loading {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        background: rgba(0,0,0,0.9);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid #00ffcc;
        display: none;
    }
    
    .loading.active { display: block; }
    
    .spinner {
        width: 50px; height: 50px;
        border: 3px solid rgba(0,255,255,0.3);
        border-top: 3px solid #00ffcc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
    }
    
    @keyframes spin {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 10px; }
</style>
</head>
<body>
<div class="bg-animation"></div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:#00ffcc;font-family:monospace;">[+] EXTRACTING INTELLIGENCE...</p>
    <small style="color:#66ccff;">Searching and extracting URLs from DuckDuckGo</small>
</div>

<div class="toast-notification" id="toast">
    <i class="fas fa-check-circle"></i> Action completed!
</div>

<div class="container mt-4">
    <div class="glitch-header">
        <h1><i class="fas fa-shield-halved"></i> OSINT ANALYZER ULTIMATE</h1>
        <div>
            <span class="subtitle"> 👁️ADVANCED INTELLIGENCE GATHERING </span>
        </div>
    </div>

    <div class="glass-card search-container">
        <form id="searchForm">
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text" style="background:rgba(0,0,0,0.6);border:1px solid #00ffcc;color:#00ffcc;">
                            <i class="fas fa-terminal"></i>
                        </span>
                        <input type="text" id="queryInput" class="form-control"
                               placeholder="root@osint:~$ ./investigate --target " required>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="input-group">
                        <span class="input-group-text" style="background:rgba(0,0,0,0.6);border:1px solid #00ffcc;color:#00ffcc;">
                            <i class="fas fa-chart-line"></i>
                        </span>
                        <select id="depthSelect" class="form-select">
                            <option value="1">Depth 1 | Basic Scan</option>
                            <option value="2" selected>Depth 2 | Standard Probe</option>
                            <option value="3">Depth 3 | Deep Analysis</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-hack w-100">
                        <i class="fas fa-skull"></i> EXEC
                    </button>
                </div>
            </div>
            <div class="mt-3 text-center">
                <small style="color:#00ffcc!important;">
                    <i class="fas fa-lock"></i> 📡 PASSIVE RECON · PUBLIC SOURCES ONLY
                </small>
            </div>
        </form>
    </div>

    <div class="glass-card" style="padding:15px;">
        <div id="resultMap"></div>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-title">
                <i class="fas fa-database"></i> [ EXTRACTED_URLS.LOG ]
            </div>
            <div class="terminal-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div id="results"></div>
    </div>
</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script>
const loading = document.getElementById("loading");

/* Node colors per type */
const HUB_DOMAIN = {
    "Facebook":        "facebook.com",
    "Youtube":         "youtube.com",
    "Telegram":        "telegram.org",
    "Twitter":         "twitter.com",
    "Instagram":       "instagram.com",
    "LinkedIn":        "linkedin.com",
    "GitHub":          "github.com",
    "Reddit":          "reddit.com",
    "Wikipedia":       "wikipedia.org",
    "TikTok":          "tiktok.com",
    "Coursera":        "coursera.org",
    "Udemy":           "udemy.com",
    "Medium":          "medium.com",
    "News Site":       "bbc.com",
    "Email Address":   "gmail.com",
    "Phone Number":    "whatsapp.com",
    "Government Site": "usa.gov",
    "Website":         "google.com",
};

const TYPE_COLOR = {
    "Facebook":        { bg:"#1877f2", border:"#0d5dbf", font:"#ffffff" },
    "Youtube":         { bg:"#ff0000", border:"#cc0000", font:"#ffffff" },
    "Telegram":        { bg:"#0088cc", border:"#006699", font:"#ffffff" },
    "Twitter":         { bg:"#1da1f2", border:"#0d86d1", font:"#ffffff" },
    "Instagram":       { bg:"#c13584", border:"#9a2968", font:"#ffffff" },
    "LinkedIn":        { bg:"#0077b5", border:"#005e8f", font:"#ffffff" },
    "GitHub":          { bg:"#333333", border:"#111111", font:"#ffffff" },
    "Reddit":          { bg:"#ff4500", border:"#cc3700", font:"#ffffff" },
    "Wikipedia":       { bg:"#636466", border:"#444444", font:"#ffffff" },
    "TikTok":          { bg:"#010101", border:"#ff0050", font:"#ffffff" },
    "News Site":       { bg:"#e44d26", border:"#c13b1e", font:"#ffffff" },
    "Government Site": { bg:"#003087", border:"#001f5b", font:"#ffffff" },
    "Website":         { bg:"#00aacc", border:"#0088aa", font:"#ffffff" },
    "_default":        { bg:"#00ffcc", border:"#009999", font:"#000000" },
};

function getTypeColor(type) {
    return TYPE_COLOR[type] || TYPE_COLOR["_default"];
}

function showToast(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    toast.style.background = isError ? '#ff4444' : '#00ffcc';
    toast.style.color      = isError ? '#fff'    : '#000';
    toast.style.display    = "block";
    setTimeout(() => { toast.style.display = "none"; }, 3000);
}

window.copyUrl = function(url) {
    if (url && url.startsWith('http')) {
        navigator.clipboard.writeText(url).then(() => {
            showToast("✓ URL copied: " + url.substring(0, 60) + "...");
        }).catch(() => showToast("✗ Failed to copy URL", true));
    } else {
        showToast("✗ Invalid URL", true);
    }
};

window.visitUrl = function(url) {
    if (url && url.startsWith('http')) {
        window.open(url, '_blank');
        showToast("✓ Opening: " + url.substring(0, 60) + "...");
    } else {
        showToast("✗ Cannot open invalid URL", true);
    }
};

document.getElementById("searchForm").onsubmit = async function(e) {
    e.preventDefault();
    loading.classList.add("active");

    const form = new FormData();
    form.append("query", document.getElementById("queryInput").value);
    form.append("depth", document.getElementById("depthSelect").value);

    try {
        const res  = await fetch("/search", { method:"POST", body: form });
        const data = await res.json();

        renderResults(data);
        renderGraph(data, document.getElementById("queryInput").value);
        loading.classList.remove("active");

        if (data.length === 0) showToast("No results found. Try a different query.", true);
        else showToast(`Found ${data.length} results!`);

    } catch (err) {
        console.error(err);
        loading.classList.remove("active");
        document.getElementById("results").innerHTML =
            '<div class="alert alert-danger text-center">[!] CONNECTION ERROR - CHECK SERVER [!]</div>';
        showToast("Connection error. Is the backend running?", true);
    }
};

/* ── renderResults ──────────────────────────────────────────────────────── */
function renderResults(data) {
    const container = document.getElementById("results");
    container.innerHTML = "";

    if (!data || data.length === 0) {
        container.innerHTML =
            '<div class="alert alert-warning text-center">[!] NO URLS FOUND - TRY DIFFERENT QUERY [!]</div>';
        return;
    }

    data.forEach((result, index) => {
        const type = result.type || "Website";
        const url  = result.link;

        if (!url || !url.startsWith('http')) return;

        const card = document.createElement("div");
        card.className = "result-card";

        /* Favicon via Google's free service — always works, no CORS issues */
        const iconDiv = document.createElement("div");
        iconDiv.className = "site-icon";
        const domain = new URL(url).hostname;
        const faviconImg = document.createElement("img");
        faviconImg.src = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        faviconImg.alt = type;
        faviconImg.style.cssText = "width:32px;height:32px;object-fit:contain;border-radius:4px;";
        faviconImg.onerror = () => { faviconImg.replaceWith(document.createTextNode(TYPE_EMOJI[type] || "🌐")); };
        iconDiv.appendChild(faviconImg);

        const info = document.createElement("div");
        info.className = "info";
        info.innerHTML = `
            <div class="title"><i class="fas fa-link"></i> ${escapeHtml(result.title)}</div>
            <div class="url"><i class="fas fa-globe"></i> ${escapeHtml(url)}</div>
            <div class="type"><i class="fas fa-tag"></i> ${escapeHtml(type)}</div>
            ${result.snippet ? `<div style="font-size:0.72rem;color:#aaa;margin-top:4px;">${escapeHtml(result.snippet.substring(0,120))}…</div>` : ""}
        `;

        const buttonGroup = document.createElement("div");
        buttonGroup.className = "button-group";

        const visitBtn = document.createElement("button");
        visitBtn.className = "btn-action";
        visitBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> VISIT';
        visitBtn.onclick = (u => () => window.visitUrl(u))(url);

        const copyBtn = document.createElement("button");
        copyBtn.className = "btn-action copy";
        copyBtn.innerHTML = '<i class="fas fa-copy"></i> COPY';
        copyBtn.onclick = (u => () => window.copyUrl(u))(url);

        buttonGroup.appendChild(visitBtn);
        buttonGroup.appendChild(copyBtn);
        card.appendChild(iconDiv);
        card.appendChild(info);
        card.appendChild(buttonGroup);
        container.appendChild(card);
    });
}

/* ── renderGraph ────────────────────────────────────────────────────────── */
function renderGraph(data, queryName) {
    const mapEl = document.getElementById("resultMap");

    if (!data || data.length === 0) {
        mapEl.innerHTML =
            "<div class='text-center mt-5' style='color:#ffcc00;padding:50px;'>" +
            "<i class='fas fa-project-diagram fa-3x'></i>" +
            "<h3 class='mt-3'>NO DATA TO VISUALIZE</h3>" +
            "<p>Perform a successful search to generate intelligence map</p></div>";
        return;
    }

    const nodes = [], edges = [];
    let nid = 2;

    /* Root node */
    nodes.push({
        id: 1,
        label: queryName,
        shape: "box",
        color: { background:"#00ffcc", border:"#009999" },
        font:  { color:"#000", size: 18, face:"monospace", bold: true },
        borderWidth: 3,
        margin: 10,
    });

    /* Group by type */
    const typeGroups = {};
    data.forEach(r => {
        const t = r.type || "Website";
        if (!typeGroups[t]) typeGroups[t] = [];
        typeGroups[t].push(r);
    });

    for (const type in typeGroups) {
        const typeId = nid++;
        const col    = getTypeColor(type);
        /* Type hub node — representative favicon for the category */
        const hubDomain = HUB_DOMAIN[type] || "google.com";
        nodes.push({
            id:    typeId,
            label: type,
            shape: "circularImage",
            image: `https://www.google.com/s2/favicons?domain=${hubDomain}&sz=64`,
            size:  28,
            color: { border: col.bg, background:"#001a1a",
                     highlight:{ border:"#00ffcc", background:"#002a2a" } },
            font:  { color:"#ffffff", size:13, face:"monospace" },
            borderWidth: 3,
        });
        edges.push({
            from: 1, to: typeId,
            arrows: { to:{ enabled:true, scaleFactor:0.8 } },
            color:  { color:"#00ffcc", opacity:0.8 },
            smooth: { type:"cubicBezier" },
            length: 280,
        });

        /* Leaf nodes — circularImage with each site's own favicon */
        typeGroups[type].forEach(result => {
            const leafId = nid++;
            const label  = result.title.length > 28
                ? result.title.substring(0, 25) + "…"
                : result.title;
            let leafDomain = "google.com";
            try { leafDomain = new URL(result.link).hostname; } catch(e) {}

            nodes.push({
                id:    leafId,
                label: label,
                shape: "circularImage",
                image: `https://www.google.com/s2/favicons?domain=${leafDomain}&sz=64`,
                size:  20,
                color: { border: col.border, background:"#001a1a",
                         highlight:{ border:"#00ffcc", background:"#002a2a" } },
                font:  { color:"#ffffff", size:11, face:"monospace" },
                title: `<b style="color:#ffcc00">${escapeHtmlRaw(result.title)}</b><br>` +
                       `<span style="color:#66ccff;font-size:11px">${escapeHtmlRaw(result.link)}</span>`,
                url:   result.link,
            });
            edges.push({
                from:   typeId,
                to:     leafId,
                dashes: true,
                color:  { color: col.border, opacity:0.6 },
                smooth: { type:"cubicBezier" },
                length: 180,
            });
        });
    }

    mapEl.innerHTML = "";

    const network = new vis.Network(
        mapEl,
        { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) },
        {
            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -8000,
                    centralGravity: 0.3,
                    springLength: 250,
                    damping: 0.09,
                },
            },
            interaction: {
                hover:    true,
                zoomView: true,
                dragView: true,
                tooltipDelay: 100,
            },
            nodes: {
                borderWidth: 2,
                shadow: false,
            },
            edges: {
                width: 1.5,
            },
        }
    );

    /* Click on a leaf node → open URL */
    network.on("click", params => {
        if (params.nodes.length === 1) {
            const nodeId  = params.nodes[0];
            const nodeObj = nodes.find(n => n.id === nodeId);
            if (nodeObj && nodeObj.url) window.open(nodeObj.url, "_blank");
        }
    });

    network.on("hoverNode", () => { mapEl.style.cursor = "pointer"; });
    network.on("blurNode",  () => { mapEl.style.cursor = "default"; });
}

function escapeHtml(str) {
    if (!str) return 'N/A';
    return str.replace(/[&<>"']/g, m =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

function escapeHtmlRaw(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

console.log("%c⚡ OSINT ANALYZER ULTIMATE ONLINE ⚡", "color:#00ffcc;font-size:16px;font-family:monospace;");
</script>
</body>
</html>
