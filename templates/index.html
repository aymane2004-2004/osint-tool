<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Analyzer Ultimate | Intelligence Platform</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Segoe UI', 'Rubik', sans-serif;
        background: linear-gradient(135deg, #0a0e27 0%, #0a0a0a 100%);
        color: #fff;
        min-height: 100vh;
    }
    
    .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
        animation: pulse 4s ease-in-out infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
    }
    
    .container {
        max-width: 1400px;
        position: relative;
        z-index: 1;
    }
    
    .glitch-header {
        text-align: center;
        margin: 20px 0 30px;
    }
    
    .glitch-header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: gradient 3s ease infinite;
    }
    
    @keyframes gradient {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }
    
    .subtitle {
        text-align: center;
        color: #00ffcc;
        font-size: 0.85rem;
        border-top: 1px solid rgba(0, 255, 255, 0.3);
        border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        display: inline-block;
        padding: 5px 20px;
        letter-spacing: 2px;
    }
    
    .glass-card {
        background: rgba(10, 10, 20, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(0, 255, 255, 0.2);
        transition: all 0.3s ease;
    }
    
    .search-container {
        padding: 25px;
        margin-bottom: 25px;
    }
    
    .form-control, .form-select {
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #00ffcc;
        color: #00ffcc;
        font-family: 'Courier New', monospace;
    }
    
    .form-control:focus, .form-select:focus {
        background: rgba(0, 0, 0, 0.8);
        border-color: #00ffff;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        color: #00ffff;
    }
    
    .btn-hack {
        background: linear-gradient(135deg, #00ffcc, #0099ff);
        border: none;
        color: #000;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s;
    }
    
    .btn-hack:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        color: #000;
    }
    
    #resultMap {
        border: 2px solid rgba(0, 255, 255, 0.3);
        height: 500px;
        margin-top: 20px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 15px;
        overflow: hidden;
    }
    
    .terminal {
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #00ffcc;
        border-radius: 15px;
        padding: 20px;
        margin-top: 25px;
    }
    
    .terminal-header {
        border-bottom: 1px solid #00ffcc;
        padding-bottom: 10px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .terminal-title {
        color: #00ffcc;
        font-family: monospace;
        font-size: 0.9rem;
    }
    
    .terminal-dots span {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-left: 5px;
        animation: blink 1s infinite;
    }
    
    .terminal-dots span:nth-child(1) { background: #ff0000; }
    .terminal-dots span:nth-child(2) { background: #ffff00; animation-delay: 0.3s; }
    .terminal-dots span:nth-child(3) { background: #00ff00; animation-delay: 0.6s; }
    
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }
    
    #results {
        max-height: 400px;
        overflow-y: auto;
    }
    
    .result-card {
        background: rgba(0, 255, 255, 0.05);
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 15px;
        transition: all 0.3s;
    }
    
    .result-card:hover {
        background: rgba(0, 255, 255, 0.1);
        transform: translateX(10px);
        border-color: #00ffcc;
    }
    
    .result-card img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid #00ffcc;
        object-fit: cover;
    }
    
    .result-card .info {
        flex: 1;
    }
    
    .result-card .title {
        font-weight: bold;
        color: #ffcc00;
        font-size: 1rem;
        margin-bottom: 5px;
    }
    
    .result-card .url {
        font-size: 0.7rem;
        color: #66ccff;
        word-break: break-all;
        font-family: monospace;
        margin-bottom: 5px;
        background: rgba(0,0,0,0.3);
        padding: 4px 8px;
        border-radius: 5px;
    }
    
    .result-card .type {
        font-size: 0.7rem;
        background: rgba(0, 255, 255, 0.2);
        padding: 3px 10px;
        border-radius: 20px;
        display: inline-block;
        color: #00ffcc;
    }
    
    .result-card .button-group {
        display: flex;
        gap: 8px;
    }
    
    .result-card .btn-action {
        background: linear-gradient(135deg, #00ffcc, #0099ff);
        border: none;
        color: #000;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.3s;
        font-weight: bold;
        cursor: pointer;
        font-size: 0.8rem;
    }
    
    .result-card .btn-action.copy {
        background: rgba(0, 255, 255, 0.2);
        border: 1px solid #00ffcc;
        color: #00ffcc;
    }
    
    .result-card .btn-action:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    
    .toast-notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #00ffcc;
        color: #000;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
        z-index: 3000;
        animation: slideIn 0.3s ease;
        display: none;
        font-family: monospace;
    }
    
    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        background: rgba(0, 0, 0, 0.9);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid #00ffcc;
        display: none;
    }
    
    .loading.active {
        display: block;
    }
    
    .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(0, 255, 255, 0.3);
        border-top: 3px solid #00ffcc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .tooltip-custom {
        position: absolute;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(10px);
        color: #00ffcc;
        padding: 10px 15px;
        border-radius: 10px;
        font-size: 0.85rem;
        display: none;
        z-index: 1000;
        border: 1px solid #00ffcc;
        pointer-events: none;
        font-family: monospace;
    }
    
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    
    ::-webkit-scrollbar-track {
        background: #0a0a0a;
    }
    
    ::-webkit-scrollbar-thumb {
        background: #00ffcc;
        border-radius: 10px;
    }
    
    .debug-console {
        position: fixed;
        bottom: 10px;
        left: 10px;
        background: rgba(0,0,0,0.8);
        color: #0f0;
        font-family: monospace;
        font-size: 10px;
        padding: 5px;
        border-radius: 5px;
        z-index: 9999;
    }
</style>
</head>
<body>
<div class="bg-animation"></div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color: #00ffcc; font-family: monospace;">[+] EXTRACTING INTELLIGENCE...</p>
    <small style="color: #66ccff;">Searching and extracting URLs from DuckDuckGo</small>
</div>

<div class="toast-notification" id="toast">
    <i class="fas fa-check-circle"></i> Action completed!
</div>

<div class="container mt-4">
    <div class="glitch-header">
        <h1><i class="fas fa-shield-haltered"></i> OSINT ANALYZER ULTIMATE</h1>
        <div>
            <span class="subtitle">// ADVANCED INTELLIGENCE GATHERING //</span>
        </div>
    </div>

    <div class="glass-card search-container">
        <form id="searchForm">
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(0,0,0,0.6); border:1px solid #00ffcc; color:#00ffcc;">
                            <i class="fas fa-terminal"></i>
                        </span>
                        <input type="text" id="queryInput" class="form-control" placeholder="root@osint:~$ ./investigate --target " required>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="input-group">
                        <span class="input-group-text" style="background: rgba(0,0,0,0.6); border:1px solid #00ffcc; color:#00ffcc;">
                            <i class="fas fa-chart-line"></i>
                        </span>
                        <select id="depthSelect" class="form-select">
                            <option value="1">Depth 1 | Basic Scan</option>
                            <option value="2" selected>Depth 2 | Standard Probe</option>
                            <option value="3">Depth 3 | Deep Analysis</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-hack w-100">
                        <i class="fas fa-skull"></i> EXEC
                    </button>
                </div>
            </div>
            <div class="mt-3 text-center">
                <small class="text-muted" style="color: #00ffcc!important;">
                    <i class="fas fa-lock"></i> ENCRYPTED TUNNEL | HEADLESS MODE ACTIVE
                </small>
            </div>
        </form>
    </div>

    <div class="glass-card" style="padding: 15px;">
        <div id="resultMap"></div>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-title">
                <i class="fas fa-database"></i> [ EXTRACTED_URLS.LOG ]
            </div>
            <div class="terminal-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div id="results"></div>
    </div>
</div>

<div id="tooltip" class="tooltip-custom"></div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script>
const tooltip = document.getElementById("tooltip");
const loading = document.getElementById("loading");

function showToast(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    toast.style.background = isError ? '#ff4444' : '#00ffcc';
    toast.style.color = isError ? '#fff' : '#000';
    toast.style.display = "block";
    setTimeout(() => {
        toast.style.display = "none";
    }, 3000);
}

// Global functions for URL actions
window.copyUrl = function(url) {
    console.log("COPY triggered for URL:", url);
    if (url && url !== "undefined" && url !== "null" && url.startsWith('http')) {
        navigator.clipboard.writeText(url).then(() => {
            showToast("✓ URL copied: " + url.substring(0, 60) + "...");
            console.log("Successfully copied:", url);
        }).catch(err => {
            console.error("Copy failed:", err);
            showToast("✗ Failed to copy URL", true);
        });
    } else {
        console.error("Invalid URL:", url);
        showToast("✗ Invalid URL: " + (url || "empty"), true);
    }
};

window.visitUrl = function(url) {
    console.log("VISIT triggered for URL:", url);
    if (url && url !== "undefined" && url !== "null" && url.startsWith('http')) {
        window.open(url, '_blank');
        showToast("✓ Opening: " + url.substring(0, 60) + "...");
        console.log("Opening URL:", url);
    } else {
        console.error("Invalid URL for visit:", url);
        showToast("✗ Cannot open invalid URL", true);
    }
};

document.getElementById("searchForm").onsubmit = async function(e){
    e.preventDefault();
    
    loading.classList.add("active");
    
    let form = new FormData();
    form.append("query", document.getElementById("queryInput").value);
    form.append("depth", document.getElementById("depthSelect").value);

    try {
        const res = await fetch("/search", { method: "POST", body: form });
        const data = await res.json();
        
        console.log("Results received:", data.length);
        if (data.length > 0) {
            console.log("Sample URL:", data[0].link);
            console.log("Sample Title:", data[0].title);
        }
        
        renderResults(data);
        renderGraph(data, document.getElementById("queryInput").value);
        loading.classList.remove("active");
        
        if (data.length === 0) {
            showToast("No results found. Try a different query.", true);
        } else {
            showToast(`Found ${data.length} results!`);
        }
        
    } catch (error) {
        console.error("Error:", error);
        loading.classList.remove("active");
        document.getElementById("results").innerHTML = '<div class="alert alert-danger text-center">[!] CONNECTION ERROR - CHECK SERVER [!]</div>';
        showToast("Connection error. Is the backend running?", true);
    }
};

function renderResults(data){
    const container = document.getElementById("results");
    container.innerHTML = "";
    
    if(!data || data.length === 0){
        container.innerHTML = '<div class="alert alert-warning text-center">[!] NO URLS FOUND - TRY DIFFERENT QUERY [!]</div>';
        return;
    }
    
    data.forEach((result, index) => {
        const type = result.type || "Website";
        const url = result.link;
        
        // Validate URL
        if (!url || !url.startsWith('http')) {
            console.warn(`Skipping invalid URL for result ${index}:`, url);
            return;
        }
        
        console.log(`Rendering result ${index}:`, url);
        
        const card = document.createElement("div");
        card.className = "result-card";
        
        const img = document.createElement("img");
        img.src = result.image || "https://cdn-icons-png.flaticon.com/512/565/565547.png";
        img.onerror = () => img.src = "https://cdn-icons-png.flaticon.com/512/565/565547.png";
        
        const info = document.createElement("div");
        info.className = "info";
        info.innerHTML = `
            <div class="title">
                <i class="fas fa-link"></i> ${escapeHtml(result.title)}
            </div>
            <div class="url">
                <i class="fas fa-globe"></i> ${escapeHtml(url)}
            </div>
            <div class="type"><i class="fas fa-tag"></i> ${escapeHtml(type)}</div>
        `;
        
        const buttonGroup = document.createElement("div");
        buttonGroup.className = "button-group";
        
        const visitBtn = document.createElement("button");
        visitBtn.className = "btn-action";
        visitBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> VISIT';
        visitBtn.onclick = (function(u) {
            return function() { window.visitUrl(u); };
        })(url);
        
        const copyBtn = document.createElement("button");
        copyBtn.className = "btn-action copy";
        copyBtn.innerHTML = '<i class="fas fa-copy"></i> COPY';
        copyBtn.onclick = (function(u) {
            return function() { window.copyUrl(u); };
        })(url);
        
        buttonGroup.appendChild(visitBtn);
        buttonGroup.appendChild(copyBtn);
        
        card.appendChild(img);
        card.appendChild(info);
        card.appendChild(buttonGroup);
        container.appendChild(card);
    });
    
    console.log("Rendered", data.length, "valid results");
}

function renderGraph(data, queryName){
    if(!data || data.length === 0){
        document.getElementById("resultMap").innerHTML = 
        "<div class='text-center mt-5' style='color: #ffcc00; padding: 50px;'><i class='fas fa-chart-network fa-3x'></i><h3 class='mt-3'>NO DATA TO VISUALIZE</h3><p>Perform a successful search to generate intelligence map</p></div>";
        return;
    }
    
    let nodes = [], edges = [], nid = 2;
    
    nodes.push({
        id: 1,
        label: queryName,
        shape: "box",
        color: { background: "#00ffcc", border: "#0099ff" },
        font: { color: "#000", size: 18, face: "monospace" },
        borderWidth: 3
    });
    
    const typeGroups = {};
    data.forEach(r => {
        const type = r.type || "Website";
        if(!typeGroups[type]) typeGroups[type] = [];
        typeGroups[type].push(r);
    });
    
    const icons = {
        "Facebook": ["#4267B2", "https://cdn-icons-png.flaticon.com/512/733/733547.png"],
        "Youtube": ["#FF0000", "https://cdn-icons-png.flaticon.com/512/1384/1384060.png"],
        "Telegram": ["#0088cc", "https://cdn-icons-png.flaticon.com/512/2111/2111646.png"],
        "News Site": ["#FF4500", "https://cdn-icons-png.flaticon.com/512/5968/5968885.png"],
        "Website": ["#6cf", "https://cdn-icons-png.flaticon.com/512/565/565547.png"]
    };
    
    for(const type in typeGroups){
        let typeId = nid++;
        let [color, icon] = icons[type] || ["#6cf", "https://cdn-icons-png.flaticon.com/512/565/565547.png"];
        
        nodes.push({
            id: typeId,
            label: type,
            shape: "image",
            image: icon,
            font: { color: "#fff", size: 14 }
        });
        edges.push({ from: 1, to: typeId, arrows: { to: { enabled: true } }, smooth: true, length: 300, color: "#00ffcc" });
        
        typeGroups[type].forEach(result => {
            let id = nid++;
            nodes.push({
                id: id,
                label: result.title.length > 30 ? result.title.substring(0, 27) + "..." : result.title,
                shape: "image",
                image: result.image || icon,
                font: { color: "#fff", size: 11 },
                title: `${result.title}\n${result.link}`
            });
            edges.push({ from: typeId, to: id, dashes: true, smooth: true, length: 200, color: "#66ccff" });
        });
    }
    
    const container = document.getElementById("resultMap");
    container.innerHTML = "";
    
    new vis.Network(container, {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
    }, {
        physics: { enabled: true, barnesHut: { gravitationalConstant: -8000, centralGravity: 0.3, springLength: 300 } },
        interaction: { hover: true, zoomView: true, dragView: true }
    });
}

function escapeHtml(str) {
    if(!str) return 'N/A';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

console.log("%c⚡ OSINT ANALYZER ULTIMATE ONLINE ⚡", "color: #00ffcc; font-size: 16px; font-family: monospace;");
console.log("%c>_ URL HANDLING ACTIVE | CHECK CONSOLE FOR DEBUGGING", "color: #00ffcc; font-size: 12px;");
</script>
</body>
</html>
